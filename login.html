<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="login">
        <h2>Pharmaceuticals Management Portal</h2>
        <form action="#" method="post">
            <label for="user-id">Enter your userID or ____</label><br>
            <input type="text" id="user-id"><br>
            <label for="password">Enter passcode or Pin</label><br>
            <input type="password" id="passcode"><br>
            <button type="button" id="login-btn">Login</button><br>
            <span>Forgot your password?</span>
            <span>Register now!</span><br>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
